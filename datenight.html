<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Date Night Wheel ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4d6d,#ff758f,#ffb3c1);
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
}

h1{
    color:white;
    font-size:3rem;
    text-shadow:0 0 20px rgba(255,255,255,.6);
}

.wheel-wrap{
    position:relative;
    width:550px;
    height:550px;
    margin:auto;
}

.pointer{
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:25px solid transparent;
    border-right:25px solid transparent;
    border-top:50px solid gold;
    z-index:10;
}

#wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:12px solid gold;
    box-shadow:0 0 40px gold;
    transition:transform 8s cubic-bezier(.15,.9,.15,1);
}

.center-photo{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:140px;
    height:140px;
    border-radius:50%;
    overflow:hidden;
    border:6px solid white;
}

.center-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

button{
    margin-top:25px;
    padding:16px 40px;
    border:none;
    border-radius:40px;
    font-size:1.2rem;
    cursor:pointer;
    font-weight:bold;
}

#result{
    margin-top:25px;
    color:white;
    font-size:2rem;
    min-height:60px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>❤️ Our Date Night Wheel ❤️</h1>

<div class="wheel-wrap">

<div class="pointer"></div>

<canvas id="wheel" width="600" height="600"></canvas>

<div class="center-photo">
<img src="photo.jpg">
</div>

</div>

<button onclick="spinWheel()">🎉 SPIN 🎉</button>

<div id="result"></div>

</div>

<script>

const options = [
"🍕 Pizza & Movie",
"🌅 Sunset Picnic",
"🎳 Bowling",
"🍦 Ice Cream Run",
"☕ Coffee Date",
"⭐ Stargazing",
"🎮 Game Night",
"🍣 New Restaurant",
"🚗 Mini Road Trip",
"❤️ Surprise Date"
];

const colors = [
"#ff595e",
"#ffca3a",
"#8ac926",
"#1982c4",
"#6a4c93",
"#ff006e",
"#8338ec",
"#3a86ff",
"#fb5607",
"#06d6a0"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const arc = 2*Math.PI/options.length;

function drawWheel(){

for(let i=0;i<options.length;i++){

let angle=i*arc;

ctx.beginPath();
ctx.moveTo(300,300);
ctx.arc(300,300,300,angle,angle+arc);
ctx.fillStyle=colors[i];
ctx.fill();

ctx.save();

ctx.translate(300,300);
ctx.rotate(angle+arc/2);

ctx.fillStyle="white";
ctx.font="bold 20px Arial";

ctx.fillText(options[i],130,5);

ctx.restore();
}
}

drawWheel();

let rotation=0;

function playTick(){

const audioCtx =
new(window.AudioContext||window.webkitAudioContext)();

const osc =
audioCtx.createOscillator();

const gain =
audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.type="square";
osc.frequency.value=1200;

gain.gain.setValueAtTime(
0.05,
audioCtx.currentTime
);

gain.gain.exponentialRampToValueAtTime(
0.0001,
audioCtx.currentTime+0.05
);

osc.start();
osc.stop(audioCtx.currentTime+0.05);
}

function spinWheel(){

document.getElementById("result").innerHTML="";

const extra =
3600 + Math.random()*1800;

rotation += extra;

document.getElementById("wheel")
.style.transform =
`rotate(${rotation}deg)`;

let speed=60;

const ticks = setInterval(()=>{
playTick();
},speed);

setTimeout(()=>{

clearInterval(ticks);

const normalized =
(360-(rotation%360))%360;

const index =
Math.floor(
normalized/(360/options.length)
);

const winner =
options[index];

document.getElementById("result").innerHTML =
`Tonight: ${winner}`;

confetti({
particleCount:250,
spread:180,
origin:{y:0.6}
});

},8000);

}
</script>

</body>
</html>
