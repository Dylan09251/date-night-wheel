<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Date Wheel</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#ff758f,#ffb3c1);
font-family:Arial;
}

.container{text-align:center;}

h1{color:white}

.wheel-wrap{
position:relative;
width:520px;
height:520px;
}

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-top:40px solid gold;
z-index:10;
}

canvas{
width:100%;
height:100%;
border-radius:50%;
border:10px solid gold;
transition:transform 6.5s cubic-bezier(.17,.67,.12,.99);
}

button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

#result{
color:white;
font-size:24px;
margin-top:15px;
min-height:40px;
}
</style>
</head>

<body>

<div class="container">

<h1>❤️ Date Wheel</h1>

<div class="wheel-wrap">
<div class="pointer"></div>
<canvas id="wheel" width="600" height="600"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

</div>

<script>

const options = [
"Sunset Riverwalk",
"Rooftop Dinner",
"Italian Night",
"Steak Dinner",
"Food Crawl",
"Beach Walk",
"Pizza Night",
"Coffee Date"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const center = 300;
const radius = 280;

let rotation = 0;

/* 🎯 FIXED ANGLE SYSTEM */
const arc = (2 * Math.PI) / options.length;

/* DRAW WHEEL */
function drawWheel(){

ctx.clearRect(0,0,600,600);

for(let i=0;i<options.length;i++){

const start = i * arc;
const end = start + arc;

ctx.beginPath();
ctx.moveTo(center,center);
ctx.arc(center,center,radius,start,end);
ctx.fillStyle = `hsl(${i*40},80%,60%)`;
ctx.fill();

/* text */
ctx.save();
ctx.translate(center,center);

/* 🔥 KEY FIX: rotate everything so top is 0 */
ctx.rotate(start + arc/2 - Math.PI/2);

ctx.fillStyle = "white";
ctx.font = "16px Arial";
ctx.fillText(options[i], 120, 0);

ctx.restore();
}
}

/* 🔊 simple tick */
let audioCtx;
function tick(){
if(!audioCtx){
audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

const o = audioCtx.createOscillator();
const g = audioCtx.createGain();

o.connect(g);
g.connect(audioCtx.destination);

o.frequency.value = 1200;
g.gain.value = 0.03;

o.start();
o.stop(audioCtx.currentTime + 0.03);
}

/* 🎡 SPIN (CORRECT MATH) */
function spin(){

const spinTime = 6000;
const extra = 3600 + Math.random()*1800;

rotation += extra;

/* rotate wheel visually */
canvas.style.transform = `rotate(${rotation}deg)`;

const interval = setInterval(tick, 60);

setTimeout(()=>{

clearInterval(interval);

/* 🔥 FINAL FIX: convert CSS rotation → wheel angle */
const normalized = (rotation % 360);

/* convert to radians system match */
const degreesPerSlice = 360 / options.length;

/* pointer is at top → adjust by -90 degrees */
const adjusted = (360 - normalized + 90) % 360;

const index = Math.floor(adjusted / degreesPerSlice);

const winner = options[index];

document.getElementById("result").innerText =
"Tonight: " + winner;

confetti({
particleCount:200,
spread:160,
origin:{y:0.6}
});

}, spinTime);
}

drawWheel();

</script>

</body>
</html>
